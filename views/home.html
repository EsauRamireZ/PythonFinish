<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        /* ===== DISEÑO ORIGINAL (NO TOCADO) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(236,72,153,.15) 0%, transparent 70%);
            top: -250px;
            right: -250px;
            border-radius: 50%;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(168,85,247,.15) 0%, transparent 70%);
            bottom: -200px;
            left: -200px;
            border-radius: 50%;
        }

        .container {
            background: rgba(255,255,255,.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 25px 70px rgba(0,0,0,.4);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        h1 {
            background: linear-gradient(135deg, #ec4899 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
            text-align: center;
            font-weight: 700;
        }

        .subtitle {
            color: #64748b;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .error {
            background: linear-gradient(135deg, #fce7f3 0%, #fae8ff 100%);
            color: #be185d;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #ec4899;
            display: none;
        }

        .error.show { display: block; }

        .input-group { margin-bottom: 20px; }

        label {
            display: block;
            color: #475569;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            background: #f8fafc;
            transition: all .3s ease;
        }

        input:focus {
            outline: none;
            border-color: #ec4899;
            background: white;
            box-shadow: 0 0 0 4px rgba(236,72,153,.1);
        }

        .recaptcha-container {
            margin: 25px 0;
            display: flex;
            justify-content: center;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ec4899 0%, #a855f7 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(236,72,153,.4);
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>Bienvenido</h1>
    <p class="subtitle">Inicia sesión en tu cuenta</p>

    <div id="error" class="error"></div>

    <form action="/login" method="POST">
        <div class="input-group">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" name="correo" placeholder="tu@email.com" maxlength="35" required>

            <!-- MENSAJE TIPO NAVEGADOR -->
            <div id="correo-error"
                 style="display:none;color:#ef4444;font-size:13px;margin-top:6px;">
                Incluya el dominio, por ejemplo: usuario@gmail.com
            </div>
        </div>

        <div class="input-group">
            <label for="contrasenia">Contraseña</label>
            <input type="password" id="contrasenia" name="contrasenia" placeholder="••••••••" maxlength="35" required>
        </div>

        <div class="recaptcha-container">
            <div class="g-recaptcha" data-sitekey="6LebTlYsAAAAADnLSamRI9p-VJYYovtlyxHeRD-8"></div>
        </div>

        <button type="submit">Iniciar sesión</button>
    </form>

    <div class="footer">
        ¿No tienes cuenta? <a href="/formulario">Regístrate aquí</a>
    </div>
</div>

<script>
    // ===== ERROR DESDE BACKEND =====
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    if (error) {
        const errorElement = document.getElementById('error');
        errorElement.innerText = error;
        errorElement.classList.add('show');
    }

    // ===== VALIDACIÓN CORREO DINÁMICA =====
    const correo = document.getElementById('correo');
    const correoError = document.getElementById('correo-error');
    const pass = document.getElementById('contrasenia');

    function correoValido(valor) {
        return /^[^@]+@[^@]+\.[a-zA-Z]{2,}$/.test(valor);
    }

    correo.addEventListener('input', () => {
        correo.value = correo.value.replace(/\s/g, '');

        if (correo.value === '') {
            correoError.style.display = 'none';
            correo.style.borderColor = '#e2e8f0';
            return;
        }

        if (!correoValido(correo.value)) {
            correoError.style.display = 'block';
            correo.style.borderColor = '#ef4444';
        } else {
            correoError.style.display = 'none';
            correo.style.borderColor = '#22c55e';
        }
    });

    pass.addEventListener('input', e => {
        e.target.value = e.target.value.replace(/\s/g, '');
    });

    // ===== BLOQUEO FINAL =====
    document.querySelector('form').addEventListener('submit', e => {
        if (!correoValido(correo.value)) {
            e.preventDefault();
            correo.focus();
            correoError.style.display = 'block';
        }
    });
</script>
</body>
</html>
